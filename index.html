<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub | Central Pro</title>
    <style>
        :root {
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --primary: #EE4D2D;
            --primary-hover: #D83A1C;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border: #334155;
            --success: #10B981;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header Modernizado */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 800; 
            font-size: 1.3rem; 
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        .logo-area span { color: var(--primary); }

        .search-bar {
            flex: 1;
            max-width: 600px;
            display: flex;
            gap: 10px;
        }

        .input-control {
            background: #0F172A;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .input-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(238, 77, 45, 0.2); }

        .filters { display: flex; gap: 8px; align-items: center; }

        /* Botões */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); }
        .btn-secondary:hover { background: var(--border); }

        /* Grid */
        .container { max-width: 1600px; margin: 30px auto; padding: 0 30px; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        /* Card Visual Grafana */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card:hover { border-color: var(--primary); box-shadow: var(--shadow); }

        .card-header-img {
            width: 100%;
            height: 170px;
            background: #252f3f;
            position: relative;
        }
        .card-header-img img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 1.5rem; flex: 1; }
        .card-tag { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            background: rgba(238, 77, 45, 0.15); 
            color: var(--primary); 
            padding: 4px 10px; 
            border-radius: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            display: inline-block;
        }
        .card-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .card-desc { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; height: 3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .card-meta { border-top: 1px solid var(--border); padding-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.75rem; color: var(--text-muted); }
        .meta-item b { color: var(--text-main); display: block; margin-top: 2px; }

        .card-actions {
            padding: 1rem 1.5rem;
            background: rgba(15, 23, 42, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
        }

        .status-pill { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Dropdown de Opções */
        .opt-btn { background: none; border: none; color: white; cursor: pointer; padding: 5px; font-size: 1.2rem; }
        .opt-menu { 
            position: absolute; top: 10px; right: 10px; 
            background: var(--bg-card); border: 1px solid var(--border); 
            border-radius: 6px; display: none; flex-direction: column; 
            box-shadow: var(--shadow); z-index: 5;
        }
        .opt-menu button { background: none; border: none; color: white; padding: 10px 15px; text-align: left; cursor: pointer; font-size: 0.8rem; }
        .opt-menu button:hover { background: var(--border); color: var(--primary); }

        /* Modal */
        .modal-bg {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal {
            background: var(--bg-card); width: 95%; max-width: 550px;
            border-radius: 16px; border: 1px solid var(--border); overflow: hidden;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); font-size: 1.2rem; font-weight: bold; }
        .modal-content { padding: 25px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid var(--border); background: #0F172A; color: white; padding: 10px; border-radius: 6px; outline: none; }
        
        .modal-footer { padding: 15px 25px; background: rgba(0,0,0,0.2); text-align: right; display: flex; justify-content: flex-end; gap: 10px; }

        /* Toasts */
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; z-index: 9999; display: none; font-weight: 600; color: white; box-shadow: var(--shadow); }

        /* Skeleton Loading */
        .skeleton { background: #1e293b; height: 350px; border-radius: 12px; position: relative; overflow: hidden; }
        .skeleton::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: loading 1.5s infinite; }
        @keyframes loading { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        @media (max-width: 900px) {
            header { flex-direction: column; padding: 15px; }
            .search-bar { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--primary)"><path d="M13 9V3h8v6h-8zM3 13V3h8v10H3zm10 8V11h8v10h-8zM3 21v-6h8v6H3z"/></svg>
            Dashboard <span>Hub</span>
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" class="input-control" placeholder="Buscar por nome ou descrição..." oninput="filterData()">
            <select id="sortOrder" class="input-control" onchange="filterData()" style="width: 140px;">
                <option value="recent">Mais Recentes</option>
                <option value="name">Nome (A-Z)</option>
            </select>
        </div>

        <div class="filters">
            <select id="filterArea" class="input-control" onchange="filterData()">
                <option value="">Todas as Áreas</option>
                <option value="Comercial">Comercial</option>
                <option value="Financeiro">Financeiro</option>
                <option value="TI">TI</option>
                <option value="Marketing">Marketing</option>
                <option value="Operações">Operações</option>
            </select>
            <button class="btn btn-primary" onclick="openModal()">
                <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Novo
            </button>
        </div>
    </header>

    <div class="container">
        <div id="dashboardGrid" class="dashboard-grid">
            <!-- Cards gerados via JS -->
        </div>
    </div>

    <!-- Modal -->
    <div id="modalBg" class="modal-bg">
        <div class="modal">
            <div class="modal-header" id="modalTitle">Cadastrar Dashboard</div>
            <form id="dashForm">
                <div class="modal-content">
                    <input type="hidden" id="dashId">
                    <div class="form-group">
                        <label>Nome do Dashboard</label>
                        <input type="text" id="dashNome" required placeholder="Ex: Vendas Mensais">
                    </div>
                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="dashDesc" rows="2" placeholder="Breve resumo do que o dashboard exibe"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Área</label>
                            <select id="dashArea">
                                <option value="Comercial">Comercial</option>
                                <option value="Financeiro">Financeiro</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Operações">Operações</option>
                                <option value="TI">TI</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="dashStatus">
                                <option value="Ativo">Ativo</option>
                                <option value="Manutenção">Manutenção</option>
                                <option value="Arquivado">Arquivado</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Responsável</label>
                        <input type="text" id="dashResp" required placeholder="Nome do autor">
                    </div>
                    <div class="form-group">
                        <label>URL do Dashboard</label>
                        <input type="url" id="dashLink" required placeholder="https://link-do-looker-ou-pbi.com">
                    </div>
                    <div class="form-group">
                        <label>URL da Imagem de Capa (Opcional)</label>
                        <input type="url" id="dashImg" placeholder="https://imagem.com/preview.png">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Dashboard</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbe7hbRkScUPMS30BqnWwUCABe59Pk44XLgRUnd4Px9y-tShk_dfdLZZ1WgZyqvLQqlQ/exec";
        let rawData = [];

        window.onload = loadData;

        async function loadData() {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'list' })
                });
                rawData = await response.json();
                filterData();
            } catch (e) {
                showToast("Erro ao conectar ao banco de dados", "#f44336");
            }
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const area = document.getElementById('filterArea').value;
            const sort = document.getElementById('sortOrder').value;

            let filtered = rawData.filter(d => {
                return (d.Nome.toLowerCase().includes(search) || d.Descricao.toLowerCase().includes(search)) &&
                       (area === "" || d.Area === area);
            });

            if (sort === 'name') {
                filtered.sort((a, b) => a.Nome.localeCompare(b.Nome));
            } else {
                filtered.sort((a, b) => new Date(b.UltimaAtualizacao) - new Date(a.UltimaAtualizacao));
            }

            render(filtered);
        }

        function render(items) {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = items.length ? '' : '<p style="text-align:center; grid-column: 1/-1; padding: 40px; color: var(--text-muted);">Nenhum dashboard encontrado.</p>';
            
            items.forEach(dash => {
                const dotColor = dash.Status === 'Ativo' ? '#10B981' : (dash.Status === 'Manutenção' ? '#F59E0B' : '#64748B');
                const img = dash.Imagem || 'https://images.unsplash.com/photo-1551288049-bbbda546697a?q=80&w=500';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header-img">
                        <div class="opt-menu" id="opt-${dash.ID}">
                            <button onclick="editDash('${dash.ID}')">Editar</button>
                            <button onclick="deleteDash('${dash.ID}')">Excluir</button>
                        </div>
                        <button class="opt-btn" style="position:absolute; top:10px; right:10px; background: rgba(0,0,0,0.5); border-radius:50%; width:30px; height:30px;" onclick="toggleOpt(event, '${dash.ID}')">⋮</button>
                        <img src="${img}" onerror="this.src='https://images.unsplash.com/photo-1551288049-bbbda546697a?q=80&w=500'">
                    </div>
                    <div class="card-body">
                        <span class="card-tag">${dash.Area}</span>
                        <h3 class="card-title">${dash.Nome}</h3>
                        <p class="card-desc">${dash.Descricao || 'Sem descrição disponível.'}</p>
                        <div class="card-meta">
                            <div class="meta-item">Responsável <b>${dash.Responsavel}</b></div>
                            <div class="meta-item">Atualização <b>${dash.UltimaAtualizacao.split(',')[0]}</b></div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <div class="status-pill">
                            <span class="dot" style="background: ${dotColor}"></span>
                            ${dash.Status}
                        </div>
                        <button class="btn btn-secondary" onclick="window.open('${dash.Link}', '_blank')">Abrir Dashboard</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // CRUD
        document.getElementById('dashForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('dashId').value;
            const payload = {
                ID: id,
                Nome: document.getElementById('dashNome').value,
                Descricao: document.getElementById('dashDesc').value,
                Area: document.getElementById('dashArea').value,
                Status: document.getElementById('dashStatus').value,
                Responsavel: document.getElementById('dashResp').value,
                Link: document.getElementById('dashLink').value,
                Imagem: document.getElementById('dashImg').value
            };

            showToast("Salvando informações...", "#EE4D2D");
            closeModal();

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: id ? 'edit' : 'add', payload })
                });
                showToast("Sucesso!", "#10B981");
                loadData();
            } catch (err) {
                showToast("Erro ao salvar", "#f44336");
            }
        };

        async function deleteDash(id) {
            if (!confirm("Excluir este dashboard permanentemente?")) return;
            showToast("Excluindo...", "#334155");
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', payload: { id } }) });
                loadData();
            } catch (e) { showToast("Erro ao excluir", "red"); }
        }

        // Interface Helpers
        function toggleOpt(e, id) {
            e.stopPropagation();
            const menu = document.getElementById(`opt-${id}`);
            const visible = menu.style.display === 'flex';
            document.querySelectorAll('.opt-menu').forEach(m => m.style.display = 'none');
            menu.style.display = visible ? 'none' : 'flex';
        }

        function editDash(id) {
            const d = rawData.find(i => i.ID === id);
            document.getElementById('modalTitle').innerText = "Editar Dashboard";
            document.getElementById('dashId').value = d.ID;
            document.getElementById('dashNome').value = d.Nome;
            document.getElementById('dashDesc').value = d.Descricao;
            document.getElementById('dashArea').value = d.Area;
            document.getElementById('dashStatus').value = d.Status;
            document.getElementById('dashResp').value = d.Responsavel;
            document.getElementById('dashLink').value = d.Link;
            document.getElementById('dashImg').value = d.Imagem;
            document.getElementById('modalBg').style.display = 'flex';
        }

        function openModal() {
            document.getElementById('dashForm').reset();
            document.getElementById('dashId').value = "";
            document.getElementById('modalTitle').innerText = "Cadastrar Dashboard";
            document.getElementById('modalBg').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalBg').style.display = 'none'; }

        function showToast(text, color) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.background = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        window.onclick = () => document.querySelectorAll('.opt-menu').forEach(m => m.style.display = 'none');
    </script>
</body>
</html>
