<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub | Central de Inteligência</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --bg-nav: #161b22;
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --accent: #EE4D2D;
            --accent-hover: #ff6a4d;
            --status-online: #238636;
            --status-maintenence: #d29922;
            --status-offline: #f85149;
            --font-family: 'Inter', sans-serif;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area i {
            color: var(--accent);
            font-size: 1.8rem;
        }

        .logo-area h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* --- Controls (Search & Filters) --- */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px 10px 35px;
            color: var(--text-main);
            width: 300px;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(238, 77, 45, 0.2);
        }

        select {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        /* --- Main Content --- */
        main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* --- Dashboard Cards --- */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            animation: fadeIn 0.5s ease forwards;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-header .icon-box {
            width: 45px;
            height: 45px;
            background: rgba(238, 77, 45, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-online { background: rgba(35, 134, 54, 0.15); color: #3fb950; }
        .status-maintenance { background: rgba(210, 153, 34, 0.15); color: #d29922; }
        .status-offline { background: rgba(248, 81, 73, 0.15); color: #f85149; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-online { background-color: #3fb950; box-shadow: 0 0 8px #3fb950; }
        .dot-maintenance { background-color: #d29922; }
        .dot-offline { background-color: #f85149; }

        .card-body h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .card-body p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8rem;
        }

        .card-meta {
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            margin-top: auto;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
        }

        .meta-label { color: var(--text-muted); }
        .meta-value { font-weight: 500; }

        .btn-open {
            margin-top: 1.2rem;
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: var(--transition);
        }

        .btn-open:hover {
            background-color: var(--accent-hover);
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Empty State --- */
        #no-results {
            display: none;
            text-align: center;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        #no-results i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-box input {
                width: 100%;
            }

            .controls {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <i class="fa-solid fa-layer-group"></i>
            <h1>Dashboard Hub</h1>
        </div>

        <div class="controls">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar dashboards...">
            </div>

            <select id="areaFilter">
                <option value="all">Todas as Áreas</option>
                <option value="Comercial">Comercial</option>
                <option value="Financeiro">Financeiro</option>
                <option value="Operações">Operações</option>
                <option value="Marketing">Marketing</option>
                <option value="TI">TI</option>
            </select>

            <select id="statusFilter">
                <option value="all">Todos os Status</option>
                <option value="online">🟢 Online</option>
                <option value="manutencao">🟡 Manutenção</option>
                <option value="offline">🔴 Offline</option>
            </select>
        </div>
    </header>

    <main>
        <div class="grid-container" id="dashboardGrid">
            <!-- Cards serão inseridos aqui via JavaScript -->
        </div>

        <div id="no-results">
            <i class="fa-regular fa-face-frown"></i>
            <p>Nenhum dashboard encontrado com os critérios selecionados.</p>
        </div>
    </main>

    <script>
        /**
         * FONTE DE DADOS DINÂMICA
         * Você pode substituir este array pelo resultado de um fetch de API,
         * Google Sheets ou um arquivo JSON externo.
         */
        const DASHBOARD_DATA = [
            {
                id: 1,
                nome: "Performance de Vendas",
                descricao: "Acompanhamento em tempo real de KPIs de vendas, conversão e metas mensais por região.",
                area: "Comercial",
                atualizacao: "10 min atrás",
                status: "online",
                url: "https://lookerstudio.google.com/",
                icon: "fa-chart-line"
            },
            {
                id: 2,
                nome: "Fluxo de Caixa",
                descricao: "Visão consolidada de entradas, saídas e projeção financeira para o próximo trimestre.",
                area: "Financeiro",
                atualizacao: "1 hora atrás",
                status: "online",
                url: "https://powerbi.microsoft.com/",
                icon: "fa-comments-dollar"
            },
            {
                id: 3,
                nome: "Infraestrutura Server",
                descricao: "Monitoramento de carga de CPU, memória e latência dos servidores de produção.",
                area: "TI",
                atualizacao: "Sincronizado",
                status: "online",
                url: "https://grafana.com/",
                icon: "fa-server"
            },
            {
                id: 4,
                nome: "Logística e Fretes",
                descricao: "Status de entregas, custos de frete e performance de transportadoras parceiras.",
                area: "Operações",
                atualizacao: "Ontem, 18:30",
                status: "manutencao",
                url: "#",
                icon: "fa-truck-fast"
            },
            {
                id: 5,
                nome: "Campanhas Digitais",
                descricao: "ROI de Ads, engajamento em redes sociais e funil de conversão de leads.",
                area: "Marketing",
                atualizacao: "2 horas atrás",
                status: "online",
                url: "#",
                icon: "fa-bullhorn"
            },
            {
                id: 6,
                nome: "Churn & Retention",
                descricao: "Análise de comportamento de clientes e taxas de cancelamento mensais.",
                area: "Comercial",
                atualizacao: "3 dias atrás",
                status: "offline",
                url: "#",
                icon: "fa-user-minus"
            }
        ];

        const grid = document.getElementById('dashboardGrid');
        const searchInput = document.getElementById('searchInput');
        const areaFilter = document.getElementById('areaFilter');
        const statusFilter = document.getElementById('statusFilter');
        const noResults = document.getElementById('no-results');

        // Função para renderizar os cards
        function renderDashboards(data) {
            grid.innerHTML = '';
            
            if (data.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            data.forEach(dash => {
                const statusInfo = getStatusDetails(dash.status);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="icon-box">
                            <i class="fa-solid ${dash.icon}"></i>
                        </div>
                        <span class="status-badge ${statusInfo.class}">
                            <span class="status-dot ${statusInfo.dotClass}"></span>
                            ${statusInfo.label}
                        </span>
                    </div>
                    <div class="card-body">
                        <h3>${dash.nome}</h3>
                        <p>${dash.descricao}</p>
                    </div>
                    <div class="card-meta">
                        <div class="meta-item">
                            <span class="meta-label">Área</span>
                            <span class="meta-value">${dash.area}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Atualizado</span>
                            <span class="meta-value">${dash.atualizacao}</span>
                        </div>
                        <a href="${dash.url}" target="_blank" class="btn-open">
                            Abrir Dashboard <i class="fa-solid fa-arrow-up-right-from-square"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Auxiliar para estilos de status
        function getStatusDetails(status) {
            switch(status) {
                case 'online': return { label: 'Online', class: 'status-online', dotClass: 'dot-online' };
                case 'manutencao': return { label: 'Manutenção', class: 'status-maintenance', dotClass: 'dot-maintenance' };
                case 'offline': return { label: 'Offline', class: 'status-offline', dotClass: 'dot-offline' };
                default: return { label: 'N/A', class: '', dotClass: '' };
            }
        }

        // Lógica de Filtro e Pesquisa
        function filterDashboards() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedArea = areaFilter.value;
            const selectedStatus = statusFilter.value;

            const filtered = DASHBOARD_DATA.filter(dash => {
                const matchesSearch = dash.nome.toLowerCase().includes(searchTerm) || 
                                    dash.descricao.toLowerCase().includes(searchTerm);
                const matchesArea = selectedArea === 'all' || dash.area === selectedArea;
                const matchesStatus = selectedStatus === 'all' || dash.status === selectedStatus;

                return matchesSearch && matchesArea && matchesStatus;
            });

            renderDashboards(filtered);
        }

        // Listeners
        searchInput.addEventListener('input', filterDashboards);
        areaFilter.addEventListener('change', filterDashboards);
        statusFilter.addEventListener('change', filterDashboards);

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboards(DASHBOARD_DATA);
        });
    </script>
</body>
</html>
