    <style>
        :root {
            /* Identidade Shopee */
            --shopee-orange: #EE4D2D;
            --shopee-orange-hover: #d73211;
            --shopee-bg: #f5f5f5;

            /* Tema Claro */
            --bg-body: var(--shopee-bg);
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --text-main: #222222;
            --text-muted: #757575;
            --primary: var(--shopee-orange);
            --primary-light: #fff5f1;
            --border: #e8e8e8;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
            --radius: 8px;
            --sidebar-width: 260px;
            --transition: all 0.25s ease;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-sidebar: #1e1e1e;
            --bg-card: #252525;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --border: #333333;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --primary-light: rgba(238, 77, 45, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; transition: var(--transition); }

        /* Sidebar */
        aside {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        /* Logo Container */
        .logo-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            text-decoration: none;
        }
        .logo-icon {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 8px rgba(238, 77, 45, 0.3);
        }
        .logo-text { font-weight: 800; font-size: 1.4rem; letter-spacing: -1px; }

        .nav-group { padding: 15px; }
        .nav-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; padding-left: 10px; }
        .nav-item {
            display: flex; align-items: center; padding: 10px 15px; text-decoration: none; color: var(--text-main);
            border-radius: 4px; gap: 12px; transition: var(--transition); margin-bottom: 2px; cursor: pointer;
            font-size: 0.9rem; font-weight: 500;
        }
        .nav-item:hover { color: var(--primary); background: var(--primary-light); }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(238, 77, 45, 0.2); }

        /* Main Content */
        main { flex: 1; margin-left: var(--sidebar-width); padding: 25px; transition: var(--transition); }

        /* Header Area */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 20px; }
        .search-box {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px;
            padding: 8px 15px; display: flex; align-items: center; gap: 10px; flex: 1; max-width: 600px;
        }
        .search-box input { border: none; background: transparent; color: var(--text-main); outline: none; width: 100%; font-size: 0.9rem; }

        .header-tools { display: flex; align-items: center; gap: 20px; }
        .clock-box { text-align: right; border-right: 2px solid var(--border); padding-right: 20px; }
        .clock-box #time { font-weight: 700; font-size: 1.1rem; color: var(--primary); display: block; }
        .clock-box #date { font-size: 0.75rem; color: var(--text-muted); }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card {
            background: var(--bg-card); padding: 20px; border-radius: 4px; border-bottom: 3px solid var(--border);
            display: flex; flex-direction: column; box-shadow: var(--shadow); transition: var(--transition);
        }
        .stat-card:hover { border-bottom-color: var(--primary); transform: translateY(-2px); }
        .stat-card span { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; }
        .stat-card h3 { font-size: 1.6rem; font-weight: 700; color: var(--text-main); }

        /* Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .dash-card {
            background: var(--bg-card); border-radius: 4px; border: 1px solid var(--border);
            padding: 20px; position: relative; transition: var(--transition);
            display: flex; flex-direction: column; gap: 15px;
        }
        .dash-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: var(--primary); }

        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .card-icon {
            width: 50px; height: 50px; border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; background: var(--primary-light); color: var(--primary);
        }

        .card-info h4 { font-size: 1.1rem; color: var(--text-main); margin-bottom: 5px; }
        .card-info p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; height: 40px; overflow: hidden; }

        /* Buttons */
        .btn {
            padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer;
            font-weight: 600; transition: var(--transition); display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--shopee-orange-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-icon { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); width: 36px; height: 36px; justify-content: center; }
        .btn-fav.active { color: var(--primary); }

        /* Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-card); width: 95%; max-width: 600px; padding: 30px;
            border-radius: 4px; box-shadow: var(--shadow); position: relative;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        input, textarea, select {
            padding: 10px; border-radius: 4px; border: 1px solid var(--border);
            background: var(--bg-body); color: var(--text-main); outline: none;
        }
        input:focus { border-color: var(--primary); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 30px; border-radius: 4px; display: none; z-index: 2000; box-shadow: var(--shadow); }

        /* Responsividade */
        @media (max-width: 1024px) {
            aside { width: 70px; }
            aside .logo-text, aside .nav-item span, aside .nav-title { display: none; }
            main { margin-left: 70px; }
            .sidebar-header { padding: 15px 5px; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo-container">
                <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
                <div class="logo-text">Shopee<span style="color:var(--text-main)">Hub</span></div>
            </a>
        </div>

        <nav class="nav-group">
            <p class="nav-title">Navegação</p>
            <div class="nav-item active" data-filter="all"><i class="fas fa-home"></i> <span>Início</span></div>
            <div class="nav-item" data-filter="favoritos"><i class="fas fa-heart"></i> <span>Favoritos</span></div>
            <div class="nav-item" data-filter="recentes"><i class="fas fa-clock"></i> <span>Recentes</span></div>
        </nav>

        <nav class="nav-group">
            <p class="nav-title">Departamentos</p>
            <div id="sector-list">
                <!-- Preenchido via JS -->
            </div>
        </nav>
    </aside>

    <main>
        <header>
            <div class="search-box">
                <i class="fas fa-search" style="color: var(--text-muted)"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por nome, responsável ou setor...">
            </div>
            <div class="header-tools">
                <div class="clock-box">
                    <span id="time">00:00:00</span>
                    <span id="date">--/--/----</span>
                </div>
                <button class="btn btn-icon" id="themeToggle" title="Alternar Tema"><i class="fas fa-moon"></i></button>
                <button class="btn btn-primary" id="btnNew"><i class="fas fa-plus"></i> Novo Dashboard</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><span>Total de Ativos</span><h3 id="stat-total">0</h3></div>
            <div class="stat-card"><span>Meus Favoritos</span><h3 id="stat-favs">0</h3></div>
            <div class="stat-card"><span>Acessos Totais</span><h3 id="stat-views">0</h3></div>
            <div class="stat-card"><span>Categorias</span><h3 id="stat-sectors">0</h3></div>
        </section>

        <div class="dashboard-grid" id="grid">
            <!-- Cards gerados dinamicamente -->
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px; color: var(--primary)">Cadastrar Dashboard</h2>
            <form id="dashForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Nome do Dashboard</label>
                        <input type="text" id="name" required placeholder="Ex: Insira o nome do projeto...">
                    </div>
                    <div class="input-group">
                        <label>Setor</label>
                        <select id="sector" required>
                            <option value="Operação">Operação</option>
                            <option value="Gestão">Gestão</option>
                            <option value="Comercial">Comercial</option>
                            <option value="Logística">Logística</option>
                            <option value="Marketing">Marketing</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Descrição Curta</label>
                    <textarea id="desc" rows="2" placeholder="Descreva brevemente o uso deste link..."></textarea>
                </div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Tipo de Ferramenta</label>
                        <select id="type">
                            <option value="Power BI">Power BI</option>
                            <option value="Sheets">Google Sheets</option>
                            <option value="HTML">Sistema HTML</option>
                            <option value="Forms">Google Forms</option>
                            <option value="Data Studio">Data Studio</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Responsável</label>
                        <input type="text" id="owner" placeholder="Nome do responsável">
                    </div>
                </div>
                <div class="input-group">
                    <label>URL / Link de Acesso</label>
                    <input type="text" id="url" required placeholder="https://exemplo.com/dashboard">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btnSave">Salvar no Portal</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">Sucesso!</div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // ╔════════════════════════════════════════════════════════════════════╗
        // ║  CONFIGURAÇÃO FIREBASE - INSIRA SUAS CREDENCIAIS ABAIXO            ║
        // ║  Obtenha em: https://console.firebase.google.com                   ║
        // ║  Projeto > Configurações > Geral > Seus apps > SDK do Firebase     ║
        // ║  IMPORTANTE: o campo databaseURL é obrigatório para o              ║
        // ║  Realtime Database funcionar.                                      ║
        // ╚════════════════════════════════════════════════════════════════════╝
        const firebaseConfig = {
            apiKey: "COLE_SUA_API_KEY_AQUI",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:abcdef123456"
        };
        // ╔════════════════════════════════════════════════════════════════════╗
        // ║  FIM DA CONFIGURAÇÃO - NÃO ALTERE NADA ABAIXO DESTA LINHA          ║
        // ╚════════════════════════════════════════════════════════════════════╝

        // --- INICIALIZAÇÃO FIREBASE (com validação de credenciais) ---
        let db = null;
        let firebaseConnected = false;

        const configPending = /COLE_SUA_API_KEY_AQUI|SEU_PROJETO/.test(JSON.stringify(firebaseConfig));

        try {
            if (configPending) {
                throw new Error("Credenciais do Firebase ainda não foram preenchidas.");
            }
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database().ref('global_dashboards');
            firebaseConnected = true;
        } catch (error) {
            console.error("Erro ao inicializar Firebase:", error.message);
        }

        // --- IDENTIDADE E ESTADO ---
        if (!localStorage.getItem('shopee_uid')) {
            localStorage.setItem('shopee_uid', 'u' + Date.now() + Math.random().toString(36).substr(2, 5));
        }
        const currentUid = localStorage.getItem('shopee_uid');

        const checkAdmin = () => localStorage.getItem('shopee_admin') === 'true';

        let dashboards = [];
        let state = { filter: 'all', search: '' };
        let recentIds = JSON.parse(localStorage.getItem('shopee_recent')) || [];
        let myFavs = JSON.parse(localStorage.getItem('shopee_favs')) || [];
        let editModeId = null; // Variável para controlar ID em edição

        // Escapa texto para inserção segura no HTML dos cards
        const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));

        // --- INICIALIZAÇÃO ---
        function init() {
            startClock();
            setupTheme();

            if (!firebaseConnected || !db) {
                showToast(configPending
                    ? "Configure as credenciais do Firebase no código para ativar o portal."
                    : "Erro de conexão com o servidor. Verifique as credenciais.");
                return;
            }

            // Escuta o Firebase em tempo real (Sincronização Global)
            // Qualquer cadastro, exclusão ou incremento de acessos feito por
            // qualquer usuário atualiza todos os navegadores conectados.
            db.on('value', (snapshot) => {
                const data = snapshot.val();
                dashboards = data ? Object.keys(data).map(key => ({ ...data[key], firebaseId: key })) : [];
                renderSectors();
                renderCards();
                updateStats();
            }, (error) => {
                console.error("Erro na sincronização Firebase:", error);
                showToast("Erro ao carregar dados. Verifique as regras do banco e sua conexão.");
            });

            // Detecta conexão/desconexão
            firebase.database().ref('.info/connected').on('value', (snap) => {
                console.log(snap.val() === true ? "Firebase conectado." : "Firebase desconectado.");
            });
        }

        // --- RENDERIZAÇÃO ---
        function renderCards() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            const filtered = dashboards.filter(d => {
                const searchTerm = state.search.toLowerCase();
                const matchesSearch = (d.name || '').toLowerCase().includes(searchTerm) ||
                                      (d.sector || '').toLowerCase().includes(searchTerm) ||
                                      (d.owner || '').toLowerCase().includes(searchTerm);

                let matchesNav = true;
                const isFav = myFavs.includes(d.firebaseId);

                if (state.filter === 'favoritos') matchesNav = isFav;
                else if (state.filter === 'recentes') matchesNav = recentIds.includes(d.firebaseId);
                else if (state.filter !== 'all') matchesNav = d.sector === state.filter;

                return matchesSearch && matchesNav;
            });

            filtered.forEach(dash => {
                const isFav = myFavs.includes(dash.firebaseId);
                const canModify = dash.authorId === currentUid || checkAdmin();
                const safeUrl = encodeURIComponent(dash.url || '');

                const card = document.createElement('div');
                card.className = 'dash-card';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-icon"><i class="fas fa-chart-bar"></i></div>
                        <button class="btn-icon btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${dash.firebaseId}')">
                            <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                        </button>
                    </div>
                    <div class="card-info">
                        <span style="font-size: 0.7rem; color: var(--primary); font-weight: 700; text-transform: uppercase;">${esc(dash.sector)}</span>
                        <h4>${esc(dash.name) || 'Sem nome'}</h4>
                        <p>${esc(dash.desc)}</p>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-primary" onclick="openDash('${dash.firebaseId}', '${safeUrl}')" style="flex: 1; justify-content: center;">
                            Acessar Dashboard
                        </button>
                        ${canModify ? `
                            <button class="btn btn-icon" onclick="openEditModal('${dash.firebaseId}')" title="Editar"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-icon" onclick="deleteDash('${dash.firebaseId}')" title="Excluir"><i class="fas fa-trash"></i></button>
                        ` : ''}
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 10px;">
                        <span><i class="fas fa-user"></i> ${esc(dash.owner) || 'N/A'}</span>
                        <span><i class="fas fa-eye"></i> ${dash.views || 0}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderSectors() {
            const sectors = [...new Set(dashboards.map(d => d.sector).filter(Boolean))];
            const container = document.getElementById('sector-list');
            container.innerHTML = sectors.map(s => `
                <div class="nav-item ${state.filter === s ? 'active' : ''}" data-filter="${esc(s)}"><i class="fas fa-folder"></i> <span>${esc(s)}</span></div>
            `).join('');

            document.querySelectorAll('#sector-list .nav-item').forEach(item => {
                item.onclick = () => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    state.filter = item.dataset.filter;
                    renderCards();
                };
            });
        }

        // --- AÇÕES ---
        function openDash(id, encodedUrl) {
            const url = decodeURIComponent(encodedUrl);

            // Histórico Recentes (Individual - LocalStorage)
            if (!recentIds.includes(id)) {
                recentIds.unshift(id);
                if (recentIds.length > 5) recentIds.pop();
                localStorage.setItem('shopee_recent', JSON.stringify(recentIds));
            }

            // Incremento de Acessos (Global no Firebase)
            if (firebaseConnected && db) {
                db.child(id).child('views').transaction(v => (v || 0) + 1)
                    .catch(err => console.error("Erro ao atualizar views:", err));
            }

            showToast("Redirecionando para o portal...");
            setTimeout(() => window.open(url, '_blank'), 400);
        }

        function toggleFav(id) {
            const index = myFavs.indexOf(id);
            if (index > -1) {
                myFavs.splice(index, 1);
            } else {
                myFavs.push(id);
            }
            localStorage.setItem('shopee_favs', JSON.stringify(myFavs));
            renderCards();
            updateStats();
        }

        function deleteDash(id) {
            if (!firebaseConnected || !db) {
                showToast("Erro: sem conexão com o servidor.");
                return;
            }

            if (confirm("Remover este acesso da biblioteca compartilhada?")) {
                db.child(id).remove()
                    .then(() => showToast("Dashboard removido!"))
                    .catch(err => {
                        console.error("Erro ao excluir:", err);
                        showToast("Erro ao excluir do servidor.");
                    });
            }
        }

        // --- EDIÇÃO ---
        function openEditModal(id) {
            const dash = dashboards.find(d => d.firebaseId === id);
            if (!dash) return;

            editModeId = id;

            // Preenche campos
            document.getElementById('name').value = dash.name || '';
            document.getElementById('sector').value = dash.sector || 'Operação';
            document.getElementById('desc').value = dash.desc || '';
            document.getElementById('type').value = dash.type || 'Power BI';
            document.getElementById('owner').value = dash.owner || '';
            document.getElementById('url').value = dash.url || '';

            // Altera Modal para modo Edição
            document.getElementById('modalTitle').innerText = "Editar Dashboard";
            document.getElementById('btnSave').innerText = "Salvar Alterações";

            document.getElementById('modal').classList.add('active');
        }

        // --- SUBMISSÃO ---
        document.getElementById('dashForm').onsubmit = (e) => {
            e.preventDefault();

            if (!firebaseConnected || !db) {
                showToast(configPending
                    ? "Configure as credenciais do Firebase no código para salvar."
                    : "Erro: sem conexão com o servidor.");
                return;
            }

            const btnSave = document.getElementById('btnSave');
            const originalText = btnSave.innerText;

            btnSave.disabled = true;
            btnSave.innerText = "Salvando...";

            let url = document.getElementById('url').value.trim();
            if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url;

            const dashData = {
                name: document.getElementById('name').value.trim(),
                sector: document.getElementById('sector').value,
                desc: document.getElementById('desc').value.trim(),
                type: document.getElementById('type').value,
                owner: document.getElementById('owner').value.trim(),
                url: url,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            };

            const promise = editModeId
                ? db.child(editModeId).update(dashData) // Atualiza registro existente
                : db.push({ ...dashData, views: 0, authorId: currentUid, createdAt: firebase.database.ServerValue.TIMESTAMP }); // Cria novo

            promise
                .then(() => {
                    closeModal();
                    document.getElementById('dashForm').reset();
                    showToast(editModeId ? "Alterações salvas com sucesso!" : "Dashboard adicionado à biblioteca global!");
                })
                .catch(err => {
                    console.error("Erro ao salvar:", err);
                    showToast("Falha ao salvar. Verifique sua conexão e as regras do banco.");
                })
                .finally(() => {
                    btnSave.disabled = false;
                    btnSave.innerText = originalText;
                });
        };

        // --- UTILITÁRIOS ---
        function updateStats() {
            document.getElementById('stat-total').innerText = dashboards.length;
            document.getElementById('stat-favs').innerText = dashboards.filter(d => myFavs.includes(d.firebaseId)).length;
            document.getElementById('stat-views').innerText = dashboards.reduce((acc, d) => acc + (d.views || 0), 0);
            document.getElementById('stat-sectors').innerText = [...new Set(dashboards.map(d => d.sector).filter(Boolean))].length;
        }

        function startClock() {
            const update = () => {
                const now = new Date();
                document.getElementById('time').innerText = now.toLocaleTimeString('pt-br');
                document.getElementById('date').innerText = now.toLocaleDateString('pt-br');
            };
            setInterval(update, 1000);
            update();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function setupTheme() {
            const btn = document.getElementById('themeToggle');
            btn.onclick = () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', next);
                btn.innerHTML = next === 'light' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            };
        }

        document.getElementById('btnNew').onclick = () => {
            editModeId = null;
            document.getElementById('dashForm').reset();
            document.getElementById('modalTitle').innerText = "Cadastrar Dashboard";
            document.getElementById('btnSave').innerText = "Salvar no Portal";
            document.getElementById('modal').classList.add('active');
        };

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            // Reset modal state
            setTimeout(() => {
                editModeId = null;
                document.getElementById('dashForm').reset();
                document.getElementById('modalTitle').innerText = "Cadastrar Dashboard";
                document.getElementById('btnSave').innerText = "Salvar no Portal";
            }, 300);
        }

        document.getElementById('searchInput').oninput = (e) => { state.search = e.target.value; renderCards(); };

        // Filtros Navegação Fixa
        document.querySelectorAll('.nav-group:first-of-type .nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                state.filter = item.dataset.filter;
                renderCards();
            };
        });

        init();
    </script>
</body>
</html>
